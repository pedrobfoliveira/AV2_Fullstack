<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - AgendaFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/frontend/styles/global.css" />
</head>
<body class="login-body">
  <main class="login-container">
    <section class="login-card">
      <h1>AgendaFlow</h1>
      <p>Entre para acessar o painel de agendamentos.</p>

      <form id="form-login">
        <label>
          Email
          <input type="email" id="login_email" required />
        </label>

        <label>
          Senha
          <input type="password" id="login_senha" required />
        </label>

        <button type="submit">Entrar</button>
      </form>

      <p id="mensagem-login" class="mensagem-login"></p>
    </section>
  </main>

  <script src="/frontend/services/api.js"></script>
  <script src="/frontend/pages/login.js"></script>
</body>
</html>
